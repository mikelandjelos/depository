sections:
- title: About me – Summary
  entries:
  - kind: text
    text: 'Professional software engineer and computer science student with an eye for detail, high level
      of diligence, and a knack for tinkering. I''m deeply invested in mathematics, which is the root
      of all areas I take interest in. I''m a keen and thorough researcher who loves materializing abstract
      ideas, mostly through software projects.

      Some of my current interests are image processing and computer vision, parallelization and concurrency
      (HPC, SIMD), computer architecture and general systems programming and low-level software engineering
      (C/C++), statistical learning (ML/DL), and more recently, Bayesian modeling.'
