- title: Selected Projects
  entries:
  - kind: entry
    title: '**The “Lost Drone” Tracker (Monte Carlo Localization)**'
    subtitle: ''
    meta:
    - '*[github-repo](https://github.com/mikelandjelos/lost-drone-tracker)*'
    highlights:
    - '**Description:** Real-time 2D state estimation and tracking system for a drone experiencing physical
      process noise (wind gusts) and measurement noise (noisy GPS sensor).'
    - '**Outcome:** Implemented kinematics-based prediction models and simulation-based sequential Bayesian
      updates (Monte Carlo localization); built a particle filter managing a swarm of N particles to represent
      position probability distribution; handled real-time resampling to collapse tracking uncertainty.'
    - '**Tools Used:** C++ (Eigen, OpenMP, GTest, Google Benchmark), Python (NumPy, Matplotlib, Quarto).'
    text: ''
  - kind: entry
    title: '**Bayesian Barcode Restoration**'
    subtitle: ''
    meta:
    - '*[github-repo](https://github.com/mikelandjelos/bayesian-barcode-restoration)*'
    highlights:
    - '**Description:** Bayesian inference system designed to restore degraded, blurry, or low-contrast
      1D barcode signals back into clear binary patterns.'
    - '**Outcome:** Formulated the barcode restoration task as a hidden Markov model and binary state
      estimation problem; modeled physical lens degradation (Gaussian blur) and camera sensor noise as
      the likelihood function; implemented a neighbor-dependent binary prior to enforce structural barcode
      constraints; applied Bayesian optimization/inference to reconstruct original sequences.'
    - '**Tools Used:** C++ (Eigen, GTest), Python (PyMC, OpenCV, NumPy, SciPy, Quarto).'
    text: ''
  - kind: entry
    title: '**Log Anomaly Detection System - Bachelor Thesis**'
    subtitle: ''
    meta:
    - '*[github-repo](https://github.com/mikelandjelos/loki-siem)*'
    highlights:
    - '**Description:** System for log data aggregation, analysis - pointed towards anomaly detection
      based on principal component analysis (PCA) – and visualization of results using open source technologies.'
    - '**Outcome:** Built a log-aggregation and anomaly-detection pipeline for unbounded, out-of-order
      data sources; applied PCA for anomaly detection and the [Drain](https://jiemingzhu.github.io/pub/pjhe_icws2017.pdf)
      algorithm for log-template extraction; translated ideas from research papers into a working, enterprise-style
      pipeline.'
    - '**Tools Used:** Docker (Compose), Loki, Grafana, ELK stack, Shell scripting, Python (with Poetry).'
    text: ''
