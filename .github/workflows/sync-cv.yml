name: Sync CV

on:
  repository_dispatch:
    types: [cv-updated]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    name: Sync CV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Regenerate data/cv.yaml from curriculum-vitae
        run: python3 scripts/sync_cv.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- data/cv.yaml; then
            echo "No CV changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cv.yaml
          git commit -m "Sync CV from curriculum-vitae"
          git push
