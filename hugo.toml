baseURL = 'https://depository.mihajlo-madic.workers.dev/'
languageCode = 'en-us'
title = 'Mihajlo Madić'
timeZone = 'Europe/Belgrade'

[params]
  description = 'Personal site — research, notes, and writing.'
  footer = '&copy; 2026'
  repoURL = 'https://github.com/mikelandjelos/depository'

[taxonomies]
  tag = 'tags'
  category = 'categories'

[caches]
  [caches.getresource]
    # Hugo's default is maxAge = -1 (cache forever) for resources.GetRemote,
    # which made the "Unresolved Promises" GitHub issue list (list.html) go
    # stale indefinitely on the local dev server after an issue was
    # retitled. 1h keeps it reasonably fresh without hammering the GitHub
    # API on every build.
    maxAge = '1h'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # needed for sidenote HTML in markdown
    [markup.goldmark.extensions.passthrough]
      enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        block = [['$$', '$$']]
        inline = [['$', '$']]
  [markup.highlight]
    noClasses = false  # use CSS classes for syntax highlighting

[menus]
  [[menus.main]]
    name = 'Posts'
    url = '/posts/'
    weight = 10
  [[menus.main]]
    name = 'About'
    url = '/about/'
    weight = 20
  [[menus.main]]
    name = 'Curriculum Vitae'
    url = '/cv/'
    weight = 30
